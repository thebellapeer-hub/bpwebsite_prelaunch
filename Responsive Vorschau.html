<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>bellapeer — Responsive Vorschau</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --violet: #2b1a4d; --orange: #E96019; --flieder: #7878b8; }
  html, body {
    background: #161122;
    color: #f2f0ef;
    font-family: "Outfit", system-ui, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; padding: 32px clamp(16px, 4vw, 48px) 64px; }

  header.bar {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  header.bar h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  header.bar p { font-size: 14px; color: rgba(242,240,239,0.6); }

  /* Control chips */
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin: 18px 0 28px; }
  .chip {
    font: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.06); color: rgba(242,240,239,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    transition: background .2s, border-color .2s, color .2s;
  }
  .chip:hover { background: rgba(255,255,255,0.12); }
  .chip.active { background: var(--flieder); border-color: var(--flieder); color: #fff; }

  /* Device rail */
  .rail {
    display: flex; gap: clamp(20px, 4vw, 48px); align-items: flex-start;
    overflow-x: auto; padding-bottom: 24px; scroll-snap-type: x proximity;
  }
  .device { scroll-snap-align: start; flex: 0 0 auto; }
  .device .meta {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px;
  }
  .device .meta .name { font-size: 15px; font-weight: 500; }
  .device .meta .dim { font-size: 12px; color: rgba(242,240,239,0.5); }

  /* Phone frame */
  .frame {
    position: relative;
    background: #0c0816;
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .frame.phone { border-radius: 40px; padding: 12px; }
  .frame.tablet { border-radius: 28px; padding: 12px; }
  .frame.laptop { border-radius: 16px 16px 0 0; padding: 14px 14px 0; }

  .frame iframe {
    display: block; border: 0; background: var(--violet);
    border-radius: 28px;
  }
  .frame.laptop iframe { border-radius: 6px 6px 0 0; }
  .frame.tablet iframe { border-radius: 16px; }

  .laptop-base {
    height: 14px; border-radius: 0 0 14px 14px;
    background: linear-gradient(#1a1430,#0c0816);
    border: 1px solid rgba(255,255,255,0.14); border-top: 0;
    box-shadow: 0 18px 30px rgba(0,0,0,0.5);
  }
  .notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 22px; background: #0c0816; border-radius: 0 0 14px 14px; z-index: 2;
  }

  .hint { font-size: 13px; color: rgba(242,240,239,0.45); margin-top: 4px; }
  @media (max-width: 700px) { .hint .desk { display: none; } }
</style>
</head>
<body>
  <header class="bar">
    <h1>bellapeer — Responsive Vorschau</h1>
    <p>So sieht die Coming-Soon-Seite auf verschiedenen Geräten aus.</p>
  </header>

  <div class="controls" id="controls">
    <button class="chip active" data-view="all">Alle Geräte</button>
    <button class="chip" data-view="phone">Handy</button>
    <button class="chip" data-view="tablet">Tablet</button>
    <button class="chip" data-view="laptop">Desktop</button>
  </div>

  <div class="rail" id="rail">
    <!-- Phone -->
    <div class="device" data-kind="phone">
      <div class="meta"><span class="name">Handy</span><span class="dim">390 × 844</span></div>
      <div class="frame phone">
        <div class="notch"></div>
        <iframe src="bellapeer Coming Soon.html" width="390" height="844" title="Handy-Ansicht" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Tablet -->
    <div class="device" data-kind="tablet">
      <div class="meta"><span class="name">Tablet</span><span class="dim">820 × 1080</span></div>
      <div class="frame tablet">
        <iframe src="bellapeer Coming Soon.html" width="820" height="1080" title="Tablet-Ansicht" loading="lazy"></iframe>
      </div>
    </div>

    <!-- Laptop -->
    <div class="device" data-kind="laptop">
      <div class="meta"><span class="name">Desktop</span><span class="dim">1440 × 820</span></div>
      <div>
        <div class="frame laptop">
          <iframe src="bellapeer Coming Soon.html" width="1440" height="820" title="Desktop-Ansicht" loading="lazy"></iframe>
        </div>
        <div class="laptop-base"></div>
      </div>
    </div>
  </div>

  <p class="hint">Tipp: horizontal scrollen, um alle Geräte zu sehen.<span class="desk"> Über die Buttons oben einzelne Geräte fokussieren.</span></p>

<script>
  const controls = document.getElementById('controls');
  const devices = [...document.querySelectorAll('.device')];
  controls.addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    controls.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    devices.forEach(d => {
      d.style.display = (view === 'all' || d.dataset.kind === view) ? '' : 'none';
    });
  });
</script>
</body>
</html>
