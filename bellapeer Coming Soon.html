<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>bellapeer — bald geht's los</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="bellapeer — die Plattform, die lokales Creator-Marketing für den Lifestyle-Sektor skaliert. Bald geht's los — schreib uns an hallo@bellapeer.io." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --orange: #E96019;
    --black: #0a0a0a;
    --white: #ffffff;
    --flieder: #7878b8;
    --violet: #2b1a4d;
    --easing: cubic-bezier(0.22, 1, 0.36, 1);
    --ci: var(--flieder);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--violet);
    color: var(--white);
    font-family: "Outfit", system-ui, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }
  ::selection { background: var(--orange); color: var(--white); }

  .stage {
    position: relative;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(28px, 5vw, 56px) clamp(24px, 6vw, 80px);
    padding-top: max(clamp(28px, 5vw, 56px), env(safe-area-inset-top));
    padding-bottom: max(clamp(28px, 5vw, 56px), env(safe-area-inset-bottom));
    padding-left: max(clamp(24px, 6vw, 80px), env(safe-area-inset-left));
    padding-right: max(clamp(24px, 6vw, 80px), env(safe-area-inset-right));
    overflow: hidden;
    background: var(--violet);
  }

  /* === Animated background — orange "spotlight" that twirls / swims through === */
  .bloom {
    position: absolute; top: -40%; left: -40%; width: 180%; height: 180%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 40% 56% at 50% 50%,
      #f0612b 0%,
      #e96019 13%,
      rgba(233,96,25,0.55) 30%,
      rgba(96,64,116,0.26) 50%,
      rgba(43,26,77,0) 68%);
    transform-origin: 50% 50%;
    animation: twirl 12s linear infinite;
    will-change: transform;
  }
  @keyframes twirl {
    0%   { transform: rotate(0deg)   translate(11%, 5%) scale(1); }
    50%  { transform: rotate(180deg) translate(11%, 5%) scale(1.12); }
    100% { transform: rotate(360deg) translate(11%, 5%) scale(1); }
  }
  .bloom2 {
    position: absolute; z-index: 0; pointer-events: none;
    top: 50%; left: 42%;
    width: 50vw; height: 50vw; max-width: 800px; max-height: 800px;
    margin: -25vw 0 0 -25vw;
    background: radial-gradient(circle at 50% 50%,
      rgba(240,97,43,0.72) 0%,
      rgba(233,96,25,0.34) 34%,
      rgba(120,120,184,0.12) 58%,
      rgba(43,26,77,0) 72%);
    filter: blur(10px);
    animation: swim1 10s linear infinite;
    will-change: transform;
  }
  @keyframes swim1 {
    0%   { transform: translate(-26%, -8%) scale(1); }
    25%  { transform: translate(8%, -26%) scale(1.12); }
    50%  { transform: translate(30%, 2%) scale(1); }
    75%  { transform: translate(6%, 24%) scale(1.14); }
    100% { transform: translate(-26%, -8%) scale(1); }
  }
  .bloom3 {
    position: absolute; z-index: 0; pointer-events: none;
    top: 40%; left: 60%;
    width: 56vw; height: 56vw; max-width: 880px; max-height: 880px;
    margin: -28vw 0 0 -28vw;
    background: radial-gradient(circle at 50% 50%,
      rgba(120,120,184,0.55) 0%,
      rgba(120,120,184,0.22) 40%,
      rgba(43,26,77,0) 70%);
    filter: blur(22px);
    animation: swim2 14s linear infinite;
    will-change: transform;
  }
  @keyframes swim2 {
    0%   { transform: translate(24%, 6%) scale(1); }
    33%  { transform: translate(-10%, 24%) scale(1.16); }
    66%  { transform: translate(-22%, -14%) scale(0.9); }
    100% { transform: translate(24%, 6%) scale(1); }
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: linear-gradient(90deg, transparent 32%, rgba(40,22,72,0.32) 68%, rgba(28,14,54,0.7) 100%);
  }

  /* ---- Top bar: dominant logo left, tag right ---- */
  .top {
    position: relative; z-index: 2;
    min-height: 1px;
    display: flex; align-items: center; justify-content: flex-end; gap: 24px;
  }
  .core .logo {
    width: clamp(340px, 52vw, 740px); height: auto;
    aspect-ratio: 1486 / 397; object-fit: contain;
    object-position: left center;
    margin: clamp(10px, 2vh, 24px) 0 clamp(20px, 2.6vh, 34px) 0;
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.42));
  }
  .eyebrow-tag {
    font-size: clamp(11px, 1vw, 13px); letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.8); font-weight: 500; white-space: nowrap;
  }

  /* ---- Hero statement ---- */
  .core {
    position: relative; z-index: 2;
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    max-width: 940px;
    padding: clamp(28px, 5vh, 64px) 0;
  }
  h1.headline {
    font-weight: 300;
    font-size: clamp(36px, 4.4vw, 72px);
    line-height: 1.0;
    letter-spacing: -0.035em;
    text-wrap: balance;
  }
  h1.headline .soft { color: rgba(255,255,255,0.55); }
  h1.headline .period { color: var(--orange); }

  .lead {
    margin-top: clamp(20px, 2.8vh, 32px);
    font-size: clamp(18px, 1.6vw, 25px);
    line-height: 1.4; letter-spacing: -0.01em;
    max-width: 660px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 18px rgba(20,10,38,0.45);
  }
  .lead .hl { color: #9d9be0; font-weight: 400; }
  .accent { color: var(--orange); }

  .contact {
    margin-top: clamp(30px, 4vh, 46px);
    display: flex; flex-direction: column; gap: 16px;
    align-items: flex-start;
  }
  .contact .label { font-size: clamp(15px, 1.4vw, 19px); color: rgba(255,255,255,0.85); }
  .btn-pill {
    display: inline-flex; align-items: center; gap: 12px;
    height: 56px; padding: 0 26px;
    border-radius: 999px;
    background: var(--white); color: var(--black);
    font-weight: 500; font-size: clamp(17px, 1.5vw, 21px);
    border: 1px solid var(--white);
    transition: transform 0.4s var(--easing), background 0.3s var(--easing), border-color 0.3s var(--easing), color 0.3s var(--easing);
  }
  .btn-pill .arrow { font-size: 1em; transition: transform 0.4s var(--easing); }
  .btn-pill:hover { transform: translateY(-2px); background: var(--flieder); border-color: var(--flieder); color: var(--white); }
  .btn-pill:hover .arrow { transform: translateX(4px); }

  /* ---- Footer: copyright right-aligned ---- */
  .bottom {
    position: relative; z-index: 2;
    display: flex; align-items: flex-end; justify-content: flex-end;
  }
  .bottom .copy {
    font-size: clamp(13px, 1.2vw, 16px); color: rgba(255,255,255,0.8);
    line-height: 1.4; text-align: right;
  }
  .bottom .heart { color: var(--orange); display: inline-block; vertical-align: -1px; animation: beat 0.9s var(--easing) infinite; }
  @keyframes beat { 0%,100% { transform: scale(1); } 30% { transform: scale(1.2); } }

  /* ---- Tablet / small laptop ---- */
  @media (max-width: 900px) {
    .vignette { background: linear-gradient(120deg, transparent 28%, rgba(28,14,54,0.45) 100%); }
  }

  /* ---- Phones (portrait) ---- */
  @media (max-width: 720px) {
    .bloom { background: radial-gradient(ellipse 78% 50% at 50% 36%,
      #f0612b 0%, #e96019 14%, rgba(233,96,25,0.5) 34%, rgba(96,64,116,0.25) 56%, rgba(43,26,77,0) 74%); }
    .vignette { background: linear-gradient(180deg, transparent 30%, rgba(28,14,54,0.5) 100%); }
    .top { display: none; }
    .core { padding: clamp(16px, 3vh, 32px) 0; }
    .core .logo {
      width: min(70vw, 380px);
      margin-top: clamp(8px, 1.6vh, 18px);
      margin-bottom: clamp(16px, 2.2vh, 28px);
    }
    h1.headline { font-size: clamp(34px, 9vw, 52px); }
    .lead { font-size: clamp(17px, 4.6vw, 22px); }
    .contact { width: 100%; }
    .btn-pill { width: 100%; justify-content: center; height: 54px; }
    .bottom { justify-content: center; }
    .bottom .copy { text-align: center; }
  }

  /* ---- Small phones ---- */
  @media (max-width: 400px) {
    .core .logo { width: 74vw; }
    h1.headline { font-size: clamp(30px, 8.6vw, 40px); }
  }

  /* ---- Short / landscape screens ---- */
  @media (max-height: 560px) and (max-width: 900px) {
    .stage { padding-top: clamp(18px, 3vh, 28px); padding-bottom: clamp(18px, 3vh, 28px); }
    .core { justify-content: flex-start; padding-top: 8px; }
    .core .logo { width: min(44vw, 320px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bloom, .bloom2, .bloom3, .bottom .heart { animation: none; }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#2b1a4d">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#2b1a4d"/>
    <ellipse cx="600" cy="430" rx="320" ry="240" fill="#e96019" opacity="0.85"/>
    <ellipse cx="600" cy="430" rx="180" ry="140" fill="#f0612b"/>
    <g transform="translate(470 250)" fill="#f2f0ef">
      <path d="M70 0 C108 70 150 120 150 180 C150 232 112 270 70 270 C40 270 12 250 0 220 L0 0 Z"/>
      <circle cx="205" cy="150" r="58"/>
      <path d="M205 150 L150 270 L150 150 Z"/>
    </g>
    <text x="600" y="610" font-family="Outfit, sans-serif" font-size="64" font-weight="400" fill="#f2f0ef" text-anchor="middle" letter-spacing="-2">bellapeer</text>
  </svg>
</template>
<div class="stage">
  <div class="bloom" aria-hidden="true"></div>
  <div class="bloom3" aria-hidden="true"></div>
  <div class="bloom2" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <header class="top">
    <span class="eyebrow-tag">München · Pre-Launch · 2026</span>
  </header>

  <main class="core">
    <h1 class="headline"><span class="soft">Bald</span> geht's los<span class="period">.</span></h1>
    <img class="logo" src="assets/logo_offwhite_trim.png" alt="bellapeer" />
    <p class="lead">
      Die Plattform, die <span class="hl">lokales Creator-Marketing</span> für den Lifestyle-Sektor skaliert<span class="accent">.</span>
    </p>

    <div class="contact">
      <span class="label">Fragen, Ideen oder einfach Hallo sagen<span class="accent">?</span></span>
      <a class="btn-pill" href="mailto:hallo@bellapeer.io">hallo@bellapeer.io <span class="arrow">→</span></a>
    </div>
  </main>

  <footer class="bottom">
    <div class="copy">© 2026 bellapeer · Mit <span class="heart">♥</span> aus München</div>
  </footer>
</div>
</body>
</html>
